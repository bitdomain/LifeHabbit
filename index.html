<style>

// ============ STORAGE ============
function loadState() {
    try {
        const data = localStorage.getItem('lifeStructureData');
        if (data) state.data = JSON.parse(data);
        const inv = localStorage.getItem('inventory');
        if (inv) state.inventory = JSON.parse(inv);
    } catch (e) { console.error('Load error:', e); }
}

function saveData() {
    try {
        localStorage.setItem('lifeStructureData', JSON.stringify(state.data));
    } catch (e) { console.error('Save error:', e); }
}

function saveInventory() {
    try {
        localStorage.setItem('inventory', JSON.stringify(state.inventory));
    } catch (e) { console.error('Save error:', e); }
}

// ============ HELPERS ============
function ensureToday() {
    const t = today();
    if (!state.data[t]) state.data[t] = {};
    return state.data[t];
}

function ensureCategory(id) {
    const t = ensureToday();
    if (!t[id]) t[id] = {};
    return t[id];
}

function getStreak(categoryId) {
    let streak = 0;
    const date = new Date();
    while (true) {
        const dateStr = date.toISOString().split('T')[0];
        if (state.data[dateStr] && state.data[dateStr][categoryId]?.done) {
            streak++;
            date.setDate(date.getDate() - 1);
        } else break;
    }
    return streak;
}

function getBestStreak(categoryId) {
    const dates = Object.keys(state.data).sort();
    let best = 0, cur = 0, prev = null;
    for (const d of dates) {
        if (state.data[d][categoryId]?.done) {
            if (prev) {
                const diff = (new Date(d) - new Date(prev)) / 86400000;
                cur = diff === 1 ? cur + 1 : 1;
            } else cur = 1;
            if (cur > best) best = cur;
            prev = d;
        } else { cur = 0; prev = null; }
    }
    return best;
}

function totalScore() {
    return Object.keys(state.data).reduce((sum, date) => {
        return sum + CATEGORIES.filter(c => state.data[date][c.id]?.done).length;
    }, 0);
}

function completedToday() {
    const t = state.data[today()] || {};
    return CATEGORIES.filter(c => t[c.id]?.done).length;
}

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

function getDaysBefore(n) {
    const results = [];
    for (let i = n - 1; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        results.push(d.toISOString().split('T')[0]);
    }
    return results;
}

function avgCompletionForDays(dates) {
    if (!dates.length) return 0;
    const total = dates.reduce((sum, d) => {
        const dayData = state.data[d] || {};
        return sum + CATEGORIES.filter(c => dayData[c.id]?.done).length;
    }, 0);
    return total / dates.length;
}

function avgCountForDays(dates, field) {
    const active = dates.filter(d => state.data[d] && state.data[d][field]?.count !== undefined);
    if (!active.length) return null;
    return active.reduce((sum, d) => sum + (state.data[d][field]?.count || 0), 0) / active.length;
}

function firstUseDate() {
    const dates = Object.keys(state.data).sort();
    return dates.length ? dates[0] : today();
}

function daysSinceStart() {
    const first = new Date(firstUseDate());
    const now = new Date(today());
    return Math.round((now - first) / 86400000) + 1;
}

// ============ TIMER ============
function startTimer(minutes) {
    state.timerInitial = minutes * 60;
    state.timerSeconds = minutes * 60;
    state.timerActive = true;
    startTimerInterval();
    render();
}

function startTimerInterval() {
    if (state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = setInterval(() => {
        if (!state.timerActive) { clearInterval(state.timerInterval); return; }
        state.timerSeconds--;
        if (state.timerSeconds <= 0) {
            state.timerActive = false;
            state.timerSeconds = 0;
            clearInterval(state.timerInterval);
            const cat = ensureCategory('sport');
            cat.done = true;
            cat.minutes = Math.round(state.timerInitial / 60);
            saveData();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
            alert('🎉 Sport erledigt! Super gemacht!');
        }
        updateTimerUI();
    }, 1000);
}

function updateTimerUI() {
    const display = document.getElementById('timer-display');
    if (display) display.textContent = formatTime(state.timerSeconds);
    const fill = document.getElementById('timer-fill');
    if (fill) {
        const pct = ((state.timerInitial - state.timerSeconds) / state.timerInitial) * 100;
        fill.style.width = pct + '%';
    }
}

function toggleTimer() {
    state.timerActive = !state.timerActive;
    if (state.timerActive) startTimerInterval();
    render();
}

function resetTimer() {
    state.timerActive = false;
    if (state.timerInterval) clearInterval(state.timerInterval);
    state.timerSeconds = state.timerInitial;
    render();
}

// ============ MATH ============
function generateProblem(level) {
    const ops = ['+', '-', '*'];
    const op = ops[Math.floor(Math.random() * (level === 1 ? 2 : 3))];
    let a, b, answer;
    if (level === 1) { a = Math.floor(Math.random() * 20) + 1; b = Math.floor(Math.random() * 20) + 1; }
    else if (level === 2) { a = Math.floor(Math.random() * 50) + 10; b = Math.floor(Math.random() * 50) + 10; }
    else { a = Math.floor(Math.random() * 100) + 10; b = Math.floor(Math.random() * 20) + 2; }
    if (op === '-' && b > a) [a, b] = [b, a];
    switch(op) {
        case '+': answer = a + b; break;
        case '-': answer = a - b; break;
        case '*': answer = a * b; break;
    }
    return { a, b, op, answer };
}

function startMath(level) {
    state.mathLevel = level;
    state.currentProblem = generateProblem(level);
    state.mathAnswer = '';
    state.mathFeedback = null;
    state.showMath = true;
    render();
}

function checkMath() {
    const input = document.getElementById('math-input');
    if (!input || !state.currentProblem) return;
    const userAnswer = parseInt(input.value);
    if (isNaN(userAnswer)) return;
    if (userAnswer === state.currentProblem.answer) {
        state.mathFeedback = 'correct';
        const cat = ensureCategory('mathe');
        cat.solved = (cat.solved || 0) + 1;
        cat.done = cat.solved >= 5;
        saveData();
        render();
        setTimeout(() => {
            state.currentProblem = generateProblem(state.mathLevel);
            state.mathAnswer = '';
            state.mathFeedback = null;
            render();
        }, 800);
    } else {
        state.mathFeedback = 'wrong';
        render();
        setTimeout(() => { state.mathFeedback = null; render(); }, 1500);
    }
}

function closeMath() { state.showMath = false; render(); }

    state.inventory.push({ id: 'item_' + Date.now(), name: input.value.trim(), has: true });
    saveInventory();
    input.value = '';
    render();
    setTimeout(() => { const ni = document.getElementById('new-item-input'); if (ni) ni.focus(); }, 50);
}

function removeInventoryItem(id) {

// ============ EXPORT / IMPORT ============
function exportData() {
    const payload = {
        version: 1,
        exportDate: new Date().toISOString(),
        data: state.data,
        inventory: state.inventory,
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `daily-wins-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function triggerImport() {
    document.getElementById('import-file').click();
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const payload = JSON.parse(e.target.result);
            if (!payload.data) { alert('Ungültige Datei.'); return; }
            const merge = confirm(
                `Backup vom ${payload.exportDate ? new Date(payload.exportDate).toLocaleDateString('de-DE') : '?'} gefunden.\n\n` +
                'Zusammenführen mit bestehenden Daten? (Ja = zusammenführen, Abbrechen = ersetzen)'
            );
            if (merge) {
                state.data = { ...payload.data, ...state.data };
            } else {
                state.data = payload.data;
                if (payload.inventory) state.inventory = payload.inventory;
            }
            saveData();
            saveInventory();
            alert('✅ Daten erfolgreich importiert!');
            render();
        } catch (err) {
            alert('Fehler beim Importieren: ' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function clearAllData() {
    if (confirm('⚠️ Alle Daten löschen? Das kann nicht rückgängig gemacht werden!\n\nSichere zuerst deine Daten mit dem Export!')) {
        if (confirm('Wirklich sicher? Alle Einträge werden gelöscht.')) {
            state.data = {};
            state.inventory = JSON.parse(JSON.stringify(DEFAULT_INVENTORY));
            saveData();
            saveInventory();
            render();
        }
    }
}

function renderWeekView() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const dayData = state.data[dateStr] || {};
        const completed = CATEGORIES.filter(c => dayData[c.id]?.done).length;

// ============ RENDER – CALENDAR ============
function renderCalendarView() {
    const year = state.calendarMonth.getFullYear();
    const month = state.calendarMonth.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startWeekday = (firstDay.getDay() + 6) % 7;
    const daysInMonth = lastDay.getDate();
    const monthName = state.calendarMonth.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

    let cells = [];
    for (let i = 0; i < startWeekday; i++) cells.push('<div></div>');
    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        const dateStr = date.toISOString().split('T')[0];
        const dayData = state.data[dateStr] || {};
        const completed = CATEGORIES.filter(c => dayData[c.id]?.done).length;
        const intensity = completed / CATEGORIES.length;
        const opacity = completed > 0 ? 0.2 + intensity * 0.7 : 0.05;
        const isToday = dateStr === today();
        cells.push(`
            <button class="cal-day ${isToday ? 'today' : ''}"
                    style="background: rgba(139, 92, 246, ${opacity});"
                    onclick="selectDay('${dateStr}')">
                <div>${d}</div>
                ${completed > 0 ? `<div class="cal-day-count">${completed}/9</div>` : ''}
            </button>`);
    }

    return `
        <div class="content">
            <div class="calendar-card">
                <div class="cal-nav">
                    <button onclick="changeMonth(-1)">${ICONS.chevronLeft}</button>
                    <h3>${monthName}</h3>
                    <button onclick="changeMonth(1)"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
                </div>
                <div class="cal-weekdays">
                    ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => `<div class="cal-weekday">${d}</div>`).join('')}
                </div>
                <div class="cal-grid">${cells.join('')}</div>
                <div class="cal-legend">
                    <span>Wenig</span>
                    ${[0.05, 0.3, 0.5, 0.7, 0.9].map(o => `<div class="cal-legend-box" style="background: rgba(139, 92, 246, ${o});"></div>`).join('')}
                    <span>Viel</span>
                </div>
                <p class="cal-tip">Tipp: Tag antippen für Details & Journal</p>
            </div>
        </div>`;
}

// ============ RENDER – FORTSCHRITT ============
function renderProgressView() {
    const n = state.progressPeriod;
    const thisPeriod = getDaysBefore(n);
    const lastPeriod = [];
    for (let i = n * 2 - 1; i >= n; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        lastPeriod.push(d.toISOString().split('T')[0]);
    }

    const avgThis = avgCompletionForDays(thisPeriod);
    const avgLast = avgCompletionForDays(lastPeriod);
    const pctChange = avgLast > 0 ? ((avgThis - avgLast) / avgLast * 100).toFixed(0) : null;

    const smokeThis = avgCountForDays(thisPeriod, 'rauchen');
    const smokeLast = avgCountForDays(lastPeriod, 'rauchen');
    const jointThis = avgCountForDays(thisPeriod, 'joints');
    const jointLast = avgCountForDays(lastPeriod, 'joints');

    const daysUsed = Object.keys(state.data).length;
    const totalDays = daysSinceStart();

    function trendBadge(current, previous, lowerIsBetter = false) {
        if (previous === null || previous === undefined) return '<span class="trend-badge same">Neu</span>';
        const diff = current - previous;
        if (Math.abs(diff) < 0.1) return '<span class="trend-badge same">= gleich</span>';
        if (lowerIsBetter) {
            if (diff < 0) return `<span class="trend-badge good-down">↓ ${Math.abs(diff).toFixed(1)} besser</span>`;
            return `<span class="trend-badge bad-up">↑ ${diff.toFixed(1)} schlechter</span>`;
        } else {
            if (diff > 0) return `<span class="trend-badge up">↑ ${diff.toFixed(1)} besser</span>`;
            return `<span class="trend-badge down">↓ ${Math.abs(diff).toFixed(1)} schlechter</span>`;
        }
    }

    // Last N days timeline for completions
    const timelineData = thisPeriod.map(d => {
        const dayData = state.data[d] || {};
        return CATEGORIES.filter(c => dayData[c.id]?.done).length;
    });
    const maxInPeriod = Math.max(...timelineData, 1);

    // Best streaks
    const topStreaks = CATEGORIES.map(cat => ({
        cat,
        current: getStreak(cat.id),
        best: getBestStreak(cat.id),
    })).filter(s => s.best > 0).sort((a, b) => b.best - a.best).slice(0, 4);

    return `
        <div class="content">
            <div class="stats-card">
                <h3>Zeitraum</h3>
                <div class="period-btn-row">
                    ${[7, 14, 30].map(p => `<button class="period-btn ${state.progressPeriod === p ? 'active' : ''}" onclick="setProgressPeriod(${p})">
                        ${p} Tage
                    </button>`).join('')}
                </div>
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-box-num" style="background: linear-gradient(135deg,#a78bfa,#ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">${totalScore()}</div>
                        <div class="stat-box-label">Gesamt-Wins</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box-num" style="color: #a78bfa;">${daysUsed}</div>
                        <div class="stat-box-label">Tage genutzt</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box-num" style="color: #f59e0b;">${totalDays}</div>
                        <div class="stat-box-label">Tage dabei</div>
                    </div>
                </div>
                <div class="days-since">
                    🚀 Du nutzt Daily Wins seit <strong>${totalDays}</strong> Tag${totalDays === 1 ? '' : 'en'} — weiter so!
                </div>
            </div>

            <div class="stats-card">
                <h3>Letzte ${n} Tage – Verlauf</h3>
                <div class="progress-timeline">
                    ${timelineData.map((val, i) => {
                        const d = new Date(thisPeriod[i]);
                        const label = d.toLocaleDateString('de-DE', { weekday: 'short' });
                        const fillPct = Math.round((val / CATEGORIES.length) * 100);
                        const color = val >= CATEGORIES.length * 0.7 ? '#10b981' : val >= CATEGORIES.length * 0.4 ? '#f59e0b' : '#8b5cf6';
                        return `
                            <div class="timeline-bar">
                                <div class="timeline-label">${label}</div>
                                <div class="timeline-track">
                                    <div class="timeline-fill" style="width: ${fillPct}%; background: ${color};"></div>
                                </div>
                                <div class="timeline-val" style="color: ${color};">${val}</div>
                            </div>`;
                    }).join('')}
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:12px;color:#9ca3af;">
                    <span>Ø diese Periode: <strong style="color:#fff">${avgThis.toFixed(1)}</strong></span>
                    <span>Ø letzte Periode: <strong style="color:#fff">${avgLast.toFixed(1)}</strong></span>
                    ${pctChange !== null ? `<span>${Number(pctChange) >= 0 ? '📈' : '📉'} <strong style="color:${Number(pctChange) >= 0 ? '#10b981' : '#ef4444'}">${pctChange > 0 ? '+' : ''}${pctChange}%</strong></span>` : ''}
                </div>
            </div>

            <div class="stats-card">
                <h3>Trends im Vergleich</h3>
                ${smokeThis !== null ? `
                <div class="trend-row">
                    <div class="trend-icon" style="background: rgba(239,68,68,0.15);">${ICONS.cigarette.replace('stroke-width="2"', 'stroke="#ef4444" stroke-width="2" width="18" height="18"')}</div>
                    <div class="trend-info">
                        <div class="trend-name">Rauchen</div>
                        <div class="trend-detail">Ø ${smokeThis.toFixed(1)} Zig/Tag (vorher: ${smokeLast !== null ? smokeLast.toFixed(1) : '–'})</div>
                    </div>
                    ${trendBadge(smokeThis, smokeLast, true)}
                </div>` : ''}
                ${jointThis !== null ? `
                <div class="trend-row">
                    <div class="trend-icon" style="background: rgba(34,197,94,0.15);">${ICONS.joint.replace('stroke-width="2"', 'stroke="#22c55e" stroke-width="2" width="18" height="18"')}</div>
                    <div class="trend-info">
                        <div class="trend-name">Joints</div>
                        <div class="trend-detail">Ø ${jointThis.toFixed(1)} /Tag (vorher: ${jointLast !== null ? jointLast.toFixed(1) : '–'})</div>
                    </div>
                    ${trendBadge(jointThis, jointLast, true)}
                </div>` : ''}
                <div class="trend-row">
                    <div class="trend-icon" style="background: rgba(139,92,246,0.15);">${ICONS.chart.replace('stroke-width="2"', 'stroke="#a78bfa" stroke-width="2" width="18" height="18"')}</div>
                    <div class="trend-info">
                        <div class="trend-name">Tages-Wins</div>
                        <div class="trend-detail">Ø ${avgThis.toFixed(1)} / ${CATEGORIES.length} pro Tag</div>
                    </div>
                    ${trendBadge(avgThis, avgLast)}
                </div>
            </div>

            ${topStreaks.length > 0 ? `
            <div class="stats-card">
                <h3>Beste Streaks 🏆</h3>
                ${topStreaks.map(({ cat, current, best }) => `
                    <div class="trend-row">
                        <div class="trend-icon" style="background: ${cat.color}20;">${ICONS[cat.icon].replace('stroke-width="2"', `stroke="${cat.color}" stroke-width="2" width="18" height="18"`)}</div>
                        <div class="trend-info">
                            <div class="trend-name">${cat.name}</div>
                            <div class="trend-detail">Aktuell: ${current} Tag${current !== 1 ? 'e' : ''}</div>
                        </div>
                        <span class="trend-badge up">Best: ${best} 🔥</span>
                    </div>`).join('')}
            </div>` : ''}
        </div>`;
}

                </p>
                <ol style="font-size:13px;color:#c4b5fd;margin:0;padding-left:20px;line-height:2;">
                    <li>Auf diesem Gerät: <strong style="color:#fff">Exportieren</strong> tippen → JSON-Datei speichern</li>
                    <li>Die Datei per Messenger/Mail ans neue Gerät schicken</li>
                    <li>Auf dem neuen Gerät: diese Seite öffnen → <strong style="color:#fff">Importieren</strong></li>
                </ol>
            </div>
            <div class="settings-card">
                <h3>Gefahrenzone</h3>
                <button class="settings-btn danger" onclick="clearAllData()">
                    ${ICONS.trash.replace('stroke-width="2"', 'stroke="currentColor" stroke-width="2" width="18" height="18"')}
                    Alle Daten löschen
                </button>
                <div class="settings-info" style="color:#ef4444;">
                    Nicht rückgängig machbar! Bitte zuerst exportieren.
                </div>
            </div>
        </div>`;
}

// ============ MODALS ============
function renderMathModal() {
    if (!state.showMath || !state.currentProblem) return '';
    const p = state.currentProblem;
    const t = state.data[today()] || {};
    const solved = t.mathe?.solved || 0;
    const opSymbol = p.op === '*' ? '×' : p.op;
    return `
        <div class="modal-overlay show" onclick="if(event.target===this)closeMath()">
            <div class="modal">
                <div class="modal-header">
                    <div>
                        <div style="font-size: 12px; color: #9ca3af;">Level ${state.mathLevel}</div>
                        <div style="font-size: 14px; font-weight: 600;">Gelöst: ${solved}</div>
                    </div>
                    <button class="modal-close" onclick="closeMath()">${ICONS.x}</button>
                </div>
                <div class="math-problem ${state.mathFeedback || ''}">${p.a} ${opSymbol} ${p.b} = ?</div>
                <input type="number" inputmode="numeric" pattern="[0-9]*" id="math-input" class="math-input" placeholder="Deine Antwort" />
                ${state.mathFeedback === 'correct' ? '<div class="math-feedback correct">✓ Richtig! 🎉</div>' : ''}
                ${state.mathFeedback === 'wrong' ? `<div class="math-feedback wrong">✗ Falsch – Antwort war: ${p.answer}</div>` : ''}
                <button class="math-submit" onclick="checkMath()">Prüfen</button>
            </div>
        </div>`;
}

function renderInventoryModal() {
    if (!state.showInventory) return '';
    const missing = state.inventory.filter(i => !i.has);
    return `
        <div class="modal-overlay bottom show" onclick="if(event.target===this)closeInventory()">
            <div class="modal-bottom">
                <div class="modal-header">
                    <h3>🏠 Was haben wir noch?</h3>
                    <button class="modal-close" onclick="closeInventory()">${ICONS.x}</button>
                </div>
                <p style="font-size: 13px; color: #9ca3af; margin: 0 0 16px 0;">Hak ab was du noch hast. Was nicht angehakt ist → einkaufen!</p>
                <div>
                    ${state.inventory.map(item => `
                        <div class="inv-item ${item.has ? 'has' : 'missing'}">
                            <button class="inv-check ${item.has ? 'has' : ''}" onclick="toggleInventoryItem('${item.id}')">${ICONS.check}</button>
                            <span class="inv-name ${item.has ? '' : 'missing'}">${item.name}</span>
                            <button class="inv-remove" onclick="removeInventoryItem('${item.id}')">${ICONS.x}</button>
                        </div>`).join('')}
                </div>
                <div class="inv-add">
                    <input type="text" id="new-item-input" placeholder="Neues Item hinzufügen..." onkeydown="if(event.key==='Enter')addInventoryItem()" />
                    <button onclick="addInventoryItem()">${ICONS.plus}</button>
                </div>
                ${missing.length > 0 ? `
                    <div class="shopping-list">
                        <div class="shopping-title">📝 Einkaufsliste (${missing.length})</div>
                        <div class="shopping-items">${missing.map(i => i.name).join(', ')}</div>
                    </div>` : ''}
            </div>
        </div>`;
}

function renderDayDetailModal() {
    if (!state.selectedDay) return '';
    const dayData = state.data[state.selectedDay] || {};
    const completed = CATEGORIES.filter(c => dayData[c.id]?.done).length;
    const dateStr = new Date(state.selectedDay).toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

    return `
        <div class="modal-overlay show" onclick="if(event.target===this)closeDayDetail()">
            <div class="modal">
                <div class="modal-header">
                    <h3 style="text-transform: capitalize;">${dateStr}</h3>
                    <button class="modal-close" onclick="closeDayDetail()">${ICONS.x}</button>
                </div>
                <div class="day-summary">
                    <div class="day-summary-num">${completed}/${CATEGORIES.length}</div>
                    <div class="day-summary-label">Wins an diesem Tag</div>
                </div>
                <div style="margin-bottom: 16px;">
                    ${CATEGORIES.map(cat => {
                        const done = dayData[cat.id]?.done;
                        let detail = '';
                        if (cat.id === 'rauchen' && dayData.rauchen?.count !== undefined) detail = ` • ${dayData.rauchen.count} Zigaretten`;
                        else if (cat.id === 'joints' && dayData.joints?.count !== undefined) detail = ` • ${dayData.joints.count} Joints`;
                        else if (cat.id === 'wasser' && dayData.wasser?.ml !== undefined) detail = ` • ${(dayData.wasser.ml/1000).toFixed(1)} L`;
                        else if (cat.id === 'sport' && dayData.sport?.minutes) detail = ` • ${dayData.sport.minutes} Min`;
                        else if (cat.id === 'mathe' && dayData.mathe?.solved) detail = ` • ${dayData.mathe.solved} gelöst`;
                        const bgStyle = done ? `background: ${cat.color}15; border-color: ${cat.color}30;` : '';
                        const iconColor = done ? cat.color : '#6b7280';
                        return `
                            <div class="day-cat" style="${bgStyle}">
                                <span style="color: ${iconColor};">${ICONS[cat.icon].replace('stroke-width="2"', `stroke="${iconColor}" stroke-width="2"`)}</span>
                                <span class="day-cat-name" style="color: ${done ? '#fff' : '#9ca3af'};">${cat.name}${detail}</span>
                                ${done ? `<span style="color: ${cat.color};">${ICONS.check.replace('stroke="#fff"', `stroke="${cat.color}"`)}</span>` : '<span style="font-size: 11px; color: #6b7280;">—</span>'}
                            </div>`;
                    }).join('')}
                </div>
                ${dayData.journal ? `
                    <div class="day-journal">
                        <div class="day-journal-header">${ICONS.book} Journal</div>
                        <p>${dayData.journal.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
                    </div>` : ''}
                ${!dayData.journal && completed === 0 ? '<p style="text-align: center; color: #6b7280; font-size: 13px; margin: 20px 0;">Keine Einträge an diesem Tag</p>' : ''}
            </div>
        </div>`;
}

// ============ MAIN RENDER ============
function render() {
    const dateStr = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

    const html = `
        <div class="header">
            <div class="header-row">
                <div>
                    <h1>Daily Wins</h1>
                    <p class="date">${dateStr}</p>
                </div>
                <div class="trophy">${ICONS.trophy}<span>${totalScore()}</span></div>
            </div>
            <p class="quote">${state.quote}</p>
        </div>
        <div class="tabs">
            <button class="tab ${state.view === 'today' ? 'active' : ''}" onclick="setView('today')">${ICONS.check} Heute</button>
            <button class="tab ${state.view === 'week' ? 'active' : ''}" onclick="setView('week')">${ICONS.chart} Woche</button>
            <button class="tab ${state.view === 'calendar' ? 'active' : ''}" onclick="setView('calendar')">${ICONS.calendar} Kalender</button>
            <button class="tab ${state.view === 'journal' ? 'active' : ''}" onclick="setView('journal')">${ICONS.book} Journal</button>
            <button class="tab ${state.view === 'progress' ? 'active' : ''}" onclick="setView('progress')">${ICONS.trending} Fortschritt</button>
            <button class="tab ${state.view === 'settings' ? 'active' : ''}" onclick="setView('settings')">${ICONS.settings} Backup</button>
        </div>
        ${state.view === 'today' ? renderTodayView() : ''}
        ${state.view === 'week' ? renderWeekView() : ''}
        ${state.view === 'calendar' ? renderCalendarView() : ''}
        ${state.view === 'journal' ? renderJournalView() : ''}
        ${state.view === 'progress' ? renderProgressView() : ''}
        ${state.view === 'settings' ? renderSettingsView() : ''}
        ${renderMathModal()}
        ${renderInventoryModal()}
        ${renderDayDetailModal()}
    `;

    document.getElementById('app').innerHTML = html;

    if (state.showMath) {
        setTimeout(() => {
            const inp = document.getElementById('math-input');
            if (inp) { inp.focus(); inp.onkeydown = (e) => { if (e.key === 'Enter') checkMath(); }; }
        }, 50);
    }
}

// ============ INIT ============
loadState();
render();

if (!window.matchMedia('(display-mode: standalone)').matches && !window.navigator.standalone) {
    setTimeout(() => {
        const banner = document.getElementById('install-banner');
        if (banner && !localStorage.getItem('installHintDismissed')) {
            banner.classList.add('show');
        }
    }, 3000);
}
</script>
</body>
</html>
